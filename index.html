<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Patient Notes</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
.header { background: #fff; padding: 20px 16px 16px; border-bottom: 1px solid #e5e5e5; }
.header h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; }
.header p { font-size: 13px; color: #888; margin-top: 3px; }
.search-box { margin: 16px; position: relative; }
.search-input { width: 100%; padding: 14px 16px 14px 44px; border: 1.5px solid #e5e5e5; border-radius: 12px; font-size: 16px; background: #fff; outline: none; -webkit-appearance: none; }
.search-input:focus { border-color: #3b82f6; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; color: #aaa; pointer-events: none; }
.status-bar { margin: 0 16px 16px; background: #fff; border-radius: 12px; padding: 12px 16px; border: 1px solid #e5e5e5; display: flex; align-items: center; gap: 10px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; flex-shrink: 0; transition: background 0.3s; }
.dot.selected { background: #3b82f6; }
.dot.saved { background: #22c55e; }
.dot.error { background: #ef4444; }
.status-text { font-size: 14px; color: #555; }
.status-name { font-weight: 600; color: #3b82f6; }
.section-label { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; padding: 0 16px; margin-bottom: 8px; }
.patient-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
.patient-card { background: #fff; border: 1.5px solid #e5e5e5; border-radius: 14px; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.1s; -webkit-tap-highlight-color: transparent; user-select: none; }
.patient-card:active { transform: scale(0.98); background: #f8f8f8; }
.patient-card.selected { border-color: #3b82f6; background: #eff6ff; }
.avatar { width: 42px; height: 42px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #666; flex-shrink: 0; }
.patient-card.selected .avatar { background: #dbeafe; color: #1d4ed8; }
.patient-name { font-size: 16px; font-weight: 500; color: #1a1a1a; }
.patient-id-badge { font-size: 11px; color: #aaa; margin-top: 2px; }
.check { font-size: 20px; color: #3b82f6; opacity: 0; margin-left: auto; flex-shrink: 0; }
.patient-card.selected .check { opacity: 1; }
.confirm-btn { display: none; margin: 20px 16px; padding: 16px; border-radius: 14px; background: #3b82f6; border: none; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; width: calc(100% - 32px); }
.confirm-btn.visible { display: block; }
.confirm-btn:active { background: #2563eb; }
.confirm-btn:disabled { opacity: 0.7; }
.done-state { display: none; text-align: center; padding: 60px 24px; }
.done-state.visible { display: block; }
.done-icon { font-size: 64px; margin-bottom: 16px; }
.done-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
.done-sub { font-size: 15px; color: #666; line-height: 1.5; margin-bottom: 32px; }
.reset-btn { font-size: 15px; color: #3b82f6; background: none; border: none; cursor: pointer; padding: 8px; }
.add-new-btn { margin: 12px 16px 0; padding: 14px 16px; border-radius: 12px; background: #f0f7ff; border: 1.5px dashed #3b82f6; color: #3b82f6; font-size: 15px; font-weight: 500; cursor: pointer; width: calc(100% - 32px); display: none; }
.add-new-btn.visible { display: block; }
.error-msg { margin: 0 16px; padding: 12px 16px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; color: #dc2626; font-size: 13px; display: none; }
.error-msg.visible { display: block; }
</style>
</head>
<body>

<div id="main-view">
  <div class="header">
    <h1>Patient Notes</h1>
    <p id="date-display"></p>
  </div>

  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search-input" placeholder="Search patient name..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div class="status-bar">
    <div class="dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Search and tap a patient before recording</span>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="section-label" id="section-label">Recent patients</div>
  <div class="patient-list" id="patient-list"></div>
  <button class="add-new-btn" id="add-new-btn" onclick="addNewPatient()"></button>
  <button class="confirm-btn" id="confirm-btn" onclick="confirmPatient()">✓ Ready — start recording now</button>
</div>

<div class="done-state" id="done-state">
  <div class="done-icon">✅</div>
  <div class="done-title" id="done-title">Ready to record</div>
  <div class="done-sub" id="done-sub">Note will upload automatically when Plaud syncs.</div>
  <button class="reset-btn" onclick="reset()">← Back to patient list</button>
</div>

<script>
const STORAGE_KEY = 'recent_patients';

let selectedPatient = null;
let recentPatients = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

const now = new Date();
document.getElementById('date-display').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

function initials(name) {
  return name.split(' ').filter(Boolean).map(n => n[0]).join('').slice(0, 2).toUpperCase();
}

function renderList(patients) {
  const list = document.getElementById('patient-list');
  list.innerHTML = '';
  patients.forEach((p) => {
    const card = document.createElement('div');
    card.className = 'patient-card' + (selectedPatient && selectedPatient.name === p.name ? ' selected' : '');
    card.onclick = () => selectPatient(p);
    const idBadge = p.id ? `<div class="patient-id-badge">ID: ${p.id}</div>` : '';
    card.innerHTML = `
      <div class="avatar">${initials(p.name)}</div>
      <div>
        <div class="patient-name">${p.name}</div>
        ${idBadge}
      </div>
      <span class="check">✓</span>
    `;
    list.appendChild(card);
  });
}

function search(query) {
  const q = query.toLowerCase().trim();
  const addBtn = document.getElementById('add-new-btn');
  const label = document.getElementById('section-label');

  if (!q) {
    label.textContent = 'Recent patients';
    renderList(recentPatients);
    addBtn.classList.remove('visible');
    return;
  }

  const filtered = recentPatients.filter(p => p.name.toLowerCase().includes(q));
  label.textContent = filtered.length ? 'Matching patients' : 'No matches found';
  renderList(filtered);

  if (q.length >= 2) {
    addBtn.textContent = `+ Add "${titleCase(query)}" as new patient`;
    addBtn.classList.add('visible');
  } else {
    addBtn.classList.remove('visible');
  }
}

function titleCase(str) {
  return str.replace(/\w\S*/g, txt => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase());
}

function addNewPatient() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;
  const idInput = prompt(`Enter DrChrono patient ID for "${titleCase(query)}" (optional — leave blank to skip):`);
  const patient = { name: titleCase(query), id: idInput ? idInput.trim() : '' };
  selectPatient(patient);
}

function selectPatient(p) {
  selectedPatient = p;
  document.getElementById('status-dot').className = 'dot selected';
  document.getElementById('status-text').innerHTML = `Selected: <span class="status-name">${p.name}</span>`;
  document.getElementById('confirm-btn').classList.add('visible');
  document.getElementById('error-msg').classList.remove('visible');
  const q = document.getElementById('search-input').value.toLowerCase();
  renderList(q ? recentPatients.filter(r => r.name.toLowerCase().includes(q)) : recentPatients);
}

async function confirmPatient() {
  const btn = document.getElementById('confirm-btn');
  const errorMsg = document.getElementById('error-msg');
  btn.textContent = 'Saving...';
  btn.disabled = true;
  errorMsg.classList.remove('visible');

  try {
    // POST to our backend proxy — no CORS issues
    const response = await fetch('/set-patient', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        patient_id: selectedPatient.id || '',
        patient_name: selectedPatient.name,
      }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error || `Server error ${response.status}`);
    }

    // Save to recent patients list
    recentPatients = recentPatients.filter(p => p.name !== selectedPatient.name);
    recentPatients.unshift(selectedPatient);
    recentPatients = recentPatients.slice(0, 20);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(recentPatients));

    document.getElementById('main-view').style.display = 'none';
    document.getElementById('done-state').classList.add('visible');
    document.getElementById('done-title').textContent = `Ready for ${selectedPatient.name}`;
    document.getElementById('done-sub').textContent = `${selectedPatient.name} is selected. Start your Plaud recording now — the note will upload to DrChrono automatically.`;
    document.getElementById('status-dot').className = 'dot saved';

  } catch (err) {
    errorMsg.textContent = `Failed to save: ${err.message}. Check server logs.`;
    errorMsg.classList.add('visible');
    document.getElementById('status-dot').className = 'dot error';
    btn.textContent = '✓ Ready — start recording now';
    btn.disabled = false;
  }
}

function reset() {
  selectedPatient = null;
  document.getElementById('main-view').style.display = 'block';
  document.getElementById('done-state').classList.remove('visible');
  document.getElementById('confirm-btn').classList.remove('visible');
  document.getElementById('confirm-btn').textContent = '✓ Ready — start recording now';
  document.getElementById('confirm-btn').disabled = false;
  document.getElementById('status-dot').className = 'dot';
  document.getElementById('status-text').textContent = 'Search and tap a patient before recording';
  document.getElementById('search-input').value = '';
  document.getElementById('error-msg').classList.remove('visible');
  renderList(recentPatients);
  document.getElementById('section-label').textContent = 'Recent patients';
  document.getElementById('add-new-btn').classList.remove('visible');
}

document.getElementById('search-input').addEventListener('input', e => search(e.target.value));
renderList(recentPatients);
</script>
</body>
</html>
